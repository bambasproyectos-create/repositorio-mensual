<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gerencias | Las Bambas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        /* Estilos globales para el canvas del PDF */
        canvas { 
            display: block; 
            margin: 20px auto; 
            border: 1px solid #ddd; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            max-width: 95%; 
        }
        /* Animación del botón Forms */
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
            100% { transform: scale(1); } 
        }
        /* Color MMG/Las Bambas Rojo Extrído del Logo */
        :root {
            --color-mmg-red: #ED1C24;
            --color-mmg-red-hover: #D11118;
        }
    </style>
</head>
<body class="bg-white min-h-screen text-slate-900 font-sans">

    <div id="login-section" class="flex items-center justify-center h-screen bg-slate-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200 text-center relative overflow-hidden">
            
            <img id="empresa-logo" src="logo-bambas.png" alt="Logo Las Bambas" class="mx-auto mb-6 max-w-full">
            
            <h1 class="text-3xl font-extrabold mb-2 text-[#ED1C24]">Control de Reportes</h1>
            <p class="text-slate-600 mb-8">Ingrese su código de gerencia autorizado</p>
            
            <input type="text" id="accessCode" placeholder="CÓDIGO" 
                class="w-full p-4 bg-white border border-slate-400 rounded-xl mb-6 text-center text-xl tracking-widest uppercase focus:border-[#ED1C24] outline-none">
            
            <button onclick="validarAcceso()" 
                class="w-full bg-[#ED1C24] hover:bg-[#D11118] text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                INGRESAR AL SISTEMA
            </button>
            
            <p class="text-xs text-slate-500 mt-4">Desarrollado por Nataly Coronel A.</p>
        </div>
    </div>

    <div id="report-section" class="hidden">
        <nav class="bg-slate-100 border-b border-slate-300 p-4 sticky top-0 z-10 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <div>
                    <h2 id="nombreGerencia" class="text-xl font-bold text-[#ED1C24]">---</h2>
                    <p class="text-xs text-slate-600 uppercase tracking-tighter">Reporte Mensual Automatizado</p>
                </div>
                <div class="flex gap-4">
                    <a id="btnForms" target="_blank" class="hidden bg-[#ED1C24] hover:bg-[#D11118] text-white px-5 py-2 rounded-lg text-sm font-bold pulse-red flex items-center">
                        ⚠️ LLENAR FORMS DE RENDIMIENTO
                    </a>
                    <button onclick="location.reload()" class="bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-lg text-sm text-slate-900">SALIR</button>
                </div>
            </div>
        </nav>

        <div id="pdf-container" class="container mx-auto py-8 bg-white">
            </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        var SHEET_ID = '1jniLKCMtgkJ7uTLifpCoMT8G56mOPJmjao3U7PVb4DM'; 
        var PDF_URL = 'reporte.pdf'; 

        async function validarAcceso() {
            var inputCode = document.getElementById('accessCode').value.trim().toUpperCase();
            if (!inputCode) {
                alert("Por favor, ingrese un código.");
                return;
            }

            try {
                // Construcción de URL compatible para la API de visualización de Google
                var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json';
                
                var resp = await fetch(url);
                var text = await resp.text();
                
                // Limpieza manual del JSON devuelto por Google
                var jsonText = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                var json = JSON.parse(jsonText);
                var rows = json.table.rows;

                var dataEncontrada = null;

                // Buscar el código en las filas del Excel con limpieza robusta
                for (var i = 0; i < rows.length; i++) {
                    var fila = rows[i].c;
                    // fila[0] es la columna A (Código)
                    if (fila[0] && fila[0].v && fila[0].v.toString().toUpperCase() === inputCode) {
                        dataEncontrada = {
                            nombre: fila[1] ? fila[1].v : "Gerencia", // Columna B
                            paginas: fila[2] ? fila[2].v.toString().split(/[,;]/).map(s => parseInt(s.trim())).filter(n => !isNaN(n)) : [1], // Columna C (Mejorado)
                            debeForms: fila[3] && fila[3].v.toString().toUpperCase() === "SI", // Columna D
                            linkForms: fila[4] ? fila[4].v : "#" // Columna E
                        };
                        break; // Si lo encuentra, detenemos el ciclo
                    }
                }

                if (dataEncontrada) {
                    cargarDashboard(dataEncontrada);
                } else {
                    alert("Código no reconocido. Revise su Excel.");
                }
            } catch (e) {
                console.error("Error al validar el acceso:", e);
                alert("Error de conexión. Asegúrese de que el Excel sea PÚBLICO y tenga la estructura correcta.");
            }
        }

        function cargarDashboard(data) {
            // Ocultar login, mostrar reporte
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('report-section').style.display = 'block';
            
            // Actualizar textos
            document.getElementById('nombreGerencia').innerText = data.nombre;

            // Mostrar botón de Forms si es necesario
            if (data.debeForms) {
                var btn = document.getElementById('btnForms');
                btn.style.display = 'flex';
                btn.href = data.linkForms;
            }

            // Iniciar renderizado del PDF
            renderPDF(data.paginas);
        }

        async function renderPDF(pages) {
            // Configurar el worker de PDF.js
            var pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

            try {
                var container = document.getElementById('pdf-container');
                container.innerHTML = '<p style="text-align:center; color: #64748b;">Cargando reporte mensual...</p>';
                
                var loadingTask = pdfjsLib.getDocument(PDF_URL);
                var pdf = await loadingTask.promise;
                container.innerHTML = ''; // Limpiar mensaje de carga

                for (var i = 0; i < pages.length; i++) {
                    var num = pages[i];
                    
                    // Verificar que la página solicitada exista en el PDF
                    if (num > 0 && num <= pdf.numPages) {
                        var page = await pdf.getPage(num);
                        // ALTA RESOLUCIÓN: Escala 3.5 para Full HD visual
                        var viewport = page.getViewport({ scale: 3.5 }); 
                        
                        var canvas = document.createElement('canvas');
                        var context = canvas.getContext('2d');
                        
                        // Establecemos la resolución interna real del canvas (muy alta)
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        // Ajustamos el tamaño visual para que se comprima y se vea nítido
                        canvas.style.width = "100%"; 
                        canvas.style.maxWidth = "1100px"; // Evita que sea gigantesco en PC

                        // Mejorar la calidad del renderizado de imagen en el contexto
                        context.imageSmoothingEnabled = true;
                        context.imageSmoothingQuality = "high";

                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        container.appendChild(canvas);
                    } else {
                        console.warn('La página ' + num + ' no existe en este documento PDF.');
                    }
                }
            } catch (error) {
                console.error('Error al cargar el PDF:', error);
                document.getElementById('pdf-container').innerHTML = '<p style="text-align:center; color: #ef4444;">Error: No se encontró el archivo "reporte.pdf" en la misma carpeta o hubo un problema al leerlo.</p>';
            }
        }
    </script>
</body>
</html>
