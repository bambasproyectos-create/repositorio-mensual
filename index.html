<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gerencias | Las Bambas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        canvas { 
            display: block; 
            margin: 20px auto; 
            border: 1px solid #ddd; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            max-width: 95%; 
        }
    </style>
</head>
<body class="bg-white min-h-screen text-slate-900 font-sans">

    <div id="login-section" class="flex items-center justify-center h-screen bg-slate-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200 text-center relative overflow-hidden">
            
            <img id="empresa-logo" src="logo-bambas.png" alt="Logo Las Bambas" class="mx-auto mb-6 max-w-full">
            
            <h1 class="text-3xl font-extrabold mb-2 text-[#ED1C24]">Control de Reportes</h1>
            <p class="text-slate-600 mb-8">Ingrese su código de gerencia autorizado</p>
            
            <input type="text" id="accessCode" placeholder="CÓDIGO" 
                class="w-full p-4 bg-white border border-slate-400 rounded-xl mb-6 text-center text-xl tracking-widest uppercase focus:border-[#ED1C24] outline-none">
            
            <button onclick="validarAcceso()" 
                class="w-full bg-[#ED1C24] hover:bg-[#D11118] text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                INGRESAR AL SISTEMA
            </button>
            
            <p class="text-xs text-slate-500 mt-4">Desarrollado por Nataly Coronel A.</p>
        </div>
    </div>

    <div id="report-section" class="hidden">
        <nav class="bg-slate-100 border-b border-slate-300 p-4 sticky top-0 z-10 shadow-md">
            <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
                <div>
                    <h2 id="nombreGerencia" class="text-xl font-bold text-[#ED1C24]">---</h2>
                    <p class="text-xs text-slate-600 uppercase tracking-tighter">Reporte Mensual Automatizado</p>
                </div>
                
                <div class="flex gap-2 items-center">
                    
                    <a id="btnForms" target="_blank" class="hidden bg-amber-100 hover:bg-amber-200 text-amber-900 border border-amber-300 px-4 py-2 rounded-lg text-sm font-bold items-center gap-2 transition-colors">
                        ⚠️ FORMS
                    </a>

                    <a id="btnPowerBI" href="reporte.pbix" download class="hidden bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-bold items-center gap-2 transition-colors shadow-sm">
                        ⬇️ PBIX
                    </a>
                    
                    <button id="btnDescargar" onclick="descargarPDFGenerado()" class="hidden bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-bold items-center gap-2 transition-colors shadow-sm">
                        ⬇️ PDF
                    </button>

                    <button onclick="location.reload()" class="bg-slate-200 hover:bg-slate-300 text-slate-900 px-4 py-2 rounded-lg text-sm font-bold transition-colors border border-slate-300">
                        SALIR
                    </button>
                </div>
            </div>
        </nav>

        <div id="pdf-container" class="container mx-auto py-8 bg-white">
            </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        var SHEET_ID = '1jniLKCMtgkJ7uTLifpCoMT8G56mOPJmjao3U7PVb4DM'; 
        var PDF_URL = 'reporte.pdf'; 
        
        var paginasGlobales = [];
        var nombreGerenciaGlobal = "Reporte";

        async function validarAcceso() {
            var inputCode = document.getElementById('accessCode').value.trim().toUpperCase();
            if (!inputCode) {
                alert("Por favor, ingrese un código.");
                return;
            }

            try {
                var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json';
                var resp = await fetch(url);
                var text = await resp.text();
                
                var jsonText = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                var json = JSON.parse(jsonText);
                var rows = json.table.rows;

                var dataEncontrada = null;

                for (var i = 0; i < rows.length; i++) {
                    var fila = rows[i].c;
                    if (fila[0] && fila[0].v && fila[0].v.toString().toUpperCase() === inputCode) {
                        dataEncontrada = {
                            nombre: fila[1] ? fila[1].v : "Gerencia",
                            paginas: fila[2] ? fila[2].v.toString().split(/[,;]/).map(s => parseInt(s.trim())).filter(n => !isNaN(n)) : [1],
                            debeForms: fila[3] && fila[3].v.toString().toUpperCase() === "SI",
                            linkForms: fila[4] ? fila[4].v : "#"
                        };
                        break;
                    }
                }

                if (dataEncontrada) {
                    cargarDashboard(dataEncontrada);
                } else {
                    alert("Código no reconocido. Revise su Excel.");
                }
            } catch (e) {
                console.error("Error al validar el acceso:", e);
                alert("Error de conexión con el Excel.");
            }
        }

        function cargarDashboard(data) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('report-section').style.display = 'block';
            
            document.getElementById('nombreGerencia').innerText = data.nombre;
            
            paginasGlobales = data.paginas;
            nombreGerenciaGlobal = data.nombre;

            if (data.debeForms) {
                var btnF = document.getElementById('btnForms');
                btnF.style.display = 'flex';
                btnF.href = data.linkForms;
            }

            // Mostrar los botones de descarga
            document.getElementById('btnDescargar').style.display = 'flex';
            document.getElementById('btnPowerBI').style.display = 'flex';

            renderPDF(data.paginas);
        }

        async function renderPDF(pages) {
            var pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

            try {
                var container = document.getElementById('pdf-container');
                container.innerHTML = '<p style="text-align:center; color: #64748b;">Cargando reporte mensual en alta calidad...</p>';
                
                var loadingTask = pdfjsLib.getDocument(PDF_URL);
                var pdf = await loadingTask.promise;
                container.innerHTML = ''; 

                for (var i = 0; i < pages.length; i++) {
                    var num = pages[i];
                    
                    if (num > 0 && num <= pdf.numPages) {
                        var page = await pdf.getPage(num);
                        var viewport = page.getViewport({ scale: 3.5 }); 
                        
                        var canvas = document.createElement('canvas');
                        var context = canvas.getContext('2d');
                        
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        canvas.style.width = "100%"; 
                        canvas.style.maxWidth = "1100px"; 

                        context.imageSmoothingEnabled = true;
                        context.imageSmoothingQuality = "high";

                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        container.appendChild(canvas);
                    }
                }
            } catch (error) {
                console.error(error);
                document.getElementById('pdf-container').innerHTML = '<p style="text-align:center; color: #ef4444;">Error al visualizar el PDF.</p>';
            }
        }

        async function descargarPDFGenerado() {
            var btn = document.getElementById('btnDescargar');
            // Cambiar texto a estado de carga
            btn.innerHTML = '⏳...';
            btn.disabled = true;

            try {
                const respuesta = await fetch(PDF_URL);
                const bytesOriginales = await respuesta.arrayBuffer();

                const { PDFDocument } = PDFLib;
                const pdfOriginal = await PDFDocument.load(bytesOriginales);
                const pdfNuevo = await PDFDocument.create();

                const indicesACopiar = paginasGlobales
                    .filter(num => num > 0 && num <= pdfOriginal.getPageCount())
                    .map(num => num - 1); 

                const paginasExtraidas = await pdfNuevo.copyPages(pdfOriginal, indicesACopiar);

                paginasExtraidas.forEach(pagina => {
                    pdfNuevo.addPage(pagina);
                });

                const bytesFinales = await pdfNuevo.save();
                const blob = new Blob([bytesFinales], { type: "application/pdf" });
                const urlDescarga = URL.createObjectURL(blob);

                const link = document.createElement('a');
                link.href = urlDescarga;
                const nombreLimpio = nombreGerenciaGlobal.trim().replace(/\s+/g, '_');
                link.download = `Reporte_${nombreLimpio}.pdf`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

            } catch (error) {
                console.error("Error al generar el PDF de descarga:", error);
                alert("Hubo un problema al intentar descargar el documento.");
            } finally {
                // Restaurar texto original
                btn.innerHTML = '⬇️ PDF';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
