<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gerencias | Reporte Mensual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        canvas { display: block; margin: 20px auto; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 95%; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 font-sans">

    <div id="login-section" class="flex items-center justify-center h-screen">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700 text-center">
            <h1 class="text-3xl font-extrabold mb-2 text-blue-400">Control de Reportes</h1>
            <p class="text-slate-400 mb-8">Ingrese su código de gerencia autorizado</p>
            <input type="text" id="accessCode" placeholder="CÓDIGO" 
                class="w-full p-4 bg-slate-900 border border-slate-600 rounded-xl mb-6 text-center text-xl tracking-widest uppercase focus:border-blue-500 outline-none">
            <button onclick="validarAcceso()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                INGRESAR AL SISTEMA
            </button>
        </div>
    </div>

    <div id="report-section" class="hidden">
        <nav class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-10 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <div>
                    <h2 id="nombreGerencia" class="text-xl font-bold text-blue-400">---</h2>
                    <p class="text-xs text-slate-400 uppercase tracking-tighter">Reporte Mensual Automatizado</p>
                </div>
                <div class="flex gap-4">
                    <a id="btnForms" target="_blank" class="hidden bg-red-600 hover:bg-red-500 text-white px-5 py-2 rounded-lg text-sm font-bold pulse-red flex items-center">
                        ⚠️ LLENAR FORMS DE RENDIMIENTO
                    </a>
                    <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm">SALIR</button>
                </div>
            </div>
        </nav>

        <div id="pdf-container" class="container mx-auto py-8 bg-slate-900">
            </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        var SHEET_ID = '1jniLKCMtgkJ7uTLifpCoMT8G56mOPJmjao3U7PVb4DM'; 
        var PDF_URL = 'reporte.pdf'; 

        async function validarAcceso() {
            var inputCode = document.getElementById('accessCode').value.trim().toUpperCase();
            if (!inputCode) {
                alert("Por favor, ingrese un código.");
                return;
            }

            try {
                // Construcción de URL compatible
                var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json';
                
                var resp = await fetch(url);
                var text = await resp.text();
                
                // Limpieza manual del JSON de Google
                var jsonText = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                var json = JSON.parse(jsonText);
                var rows = json.table.rows;

                var dataEncontrada = null;

                for (var i = 0; i < rows.length; i++) {
                    var fila = rows[i].c;
                    if (fila[0] && fila[0].v && fila[0].v.toString().toUpperCase() === inputCode) {
                        dataEncontrada = {
                            nombre: fila[1] ? fila[1].v : "Gerencia",
                            paginas: fila[2] ? fila[2].v.toString().split(',').map(Number) : [1],
                            debeForms: fila[3] && fila[3].v.toString().toUpperCase() === "SI",
                            linkForms: fila[4] ? fila[4].v : "#"
                        };
                        break;
                    }
                }

                if (dataEncontrada) {
                    cargarDashboard(dataEncontrada);
                } else {
                    alert("Código no reconocido. Revise su Excel.");
                }
            } catch (e) {
                console.error("Error:", e);
                alert("Error de conexión. Asegúrese de que el Excel sea PÚBLICO.");
            }
        }

        function cargarDashboard(data) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('report-section').style.display = 'block';
            document.getElementById('nombreGerencia').innerText = data.nombre;

            if (data.debeForms) {
                var btn = document.getElementById('btnForms');
                btn.style.display = 'flex';
                btn.href = data.linkForms;
            }

            renderPDF(data.paginas);
        }

        async function renderPDF(pages) {
            var pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

            try {
                var container = document.getElementById('pdf-container');
                container.innerHTML = '<p style="text-align:center">Cargando reporte...</p>';
                
                var loadingTask = pdfjsLib.getDocument(PDF_URL);
                var pdf = await loadingTask.promise;
                container.innerHTML = ''; 

                for (var i = 0; i < pages.length; i++) {
                    var num = pages[i];
                    if (num > 0 && num <= pdf.numPages) {
                        var page = await pdf.getPage(num);
                        var viewport = page.getViewport({ scale: 1.5 });
                        var canvas = document.createElement('canvas');
                        var context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        container.appendChild(canvas);
                    }
                }
            } catch (error) {
                console.error(error);
                alert("Error: No se encontró el archivo 'reporte.pdf' o hubo un problema al cargarlo.");
            }
        }
    </script>
</body>
</html>
