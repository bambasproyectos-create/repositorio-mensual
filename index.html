<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gerencias | Las Bambas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        canvas { display: block; margin: 20px auto; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 95%; transition: transform 0.2s ease; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .group:hover .submenu { opacity: 1; visibility: visible; transform: translateY(0); }
        .submenu { transition: all 0.3s ease; opacity: 0; visibility: hidden; transform: translateY(10px); }
        
        /* Estilo para el scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ED1C24; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans relative">

    <div id="login-section" class="flex items-center justify-center h-screen bg-slate-50 relative z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200 text-center">
            <img id="empresa-logo" src="logo-bambas.png" alt="Logo Las Bambas" class="mx-auto mb-6 max-w-full">
            <h1 class="text-3xl font-extrabold mb-2 text-[#ED1C24]">Control de Reportes</h1>
            <p class="text-slate-600 mb-8 font-medium">Ingrese su código de gerencia</p>
            <input type="text" id="accessCode" placeholder="CÓDIGO" class="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl mb-6 text-center text-xl tracking-widest uppercase focus:border-[#ED1C24] outline-none transition-all">
            <button onclick="validarAcceso()" class="w-full bg-[#ED1C24] hover:bg-[#D11118] text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95">INGRESAR AL SISTEMA</button>
            <p class="text-xs text-slate-500 mt-4">Desarrollado por Nataly Coronel A.</p>
        </div>
    </div>

    <div id="report-section" class="hidden pb-24">
        <nav class="bg-white border-b border-slate-300 sticky top-0 z-40 shadow-sm">
            <div class="container mx-auto px-4">
                <div class="flex justify-between items-center py-4">
                    <div>
                        <h2 id="nombreGerencia" class="text-xl font-bold text-[#ED1C24]">---</h2>
                        <p id="subtituloMes" class="text-xs text-slate-600 uppercase font-bold tracking-widest">---</p>
                    </div>
                    <button onclick="location.reload()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold transition-all">SALIR</button>
                </div>
                <div class="flex gap-8 mt-2 overflow-x-auto no-scrollbar">
                    <button id="tab-apf" onclick="cambiarPestana('APF')" class="py-3 px-2 border-b-4 border-[#ED1C24] font-bold text-[#ED1C24] transition-all">APF</button>
                    <button id="tab-capex" onclick="cambiarPestana('CAPEX')" class="py-3 px-2 border-b-4 border-transparent text-slate-500 hover:text-slate-800 font-bold transition-all">CAPEX</button>
                    <button id="tab-opex" onclick="cambiarPestana('OPEX')" class="py-3 px-2 border-b-4 border-transparent text-slate-500 hover:text-slate-800 font-bold transition-all">OPEX</button>
                </div>
            </div>
        </nav>

        <div id="pdf-container" class="container mx-auto py-8"></div>

        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center bg-slate-900/90 text-white rounded-full px-4 py-2 shadow-2xl border border-slate-700 backdrop-blur-sm gap-4">
            <button onclick="ajustarZoom(-0.5)" class="hover:text-[#ED1C24] p-1 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path></svg>
            </button>
            <span id="zoomLabel" class="text-xs font-bold w-12 text-center">350%</span>
            <button onclick="ajustarZoom(0.5)" class="hover:text-[#ED1C24] p-1 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
            </button>
            <div class="w-px h-4 bg-slate-600"></div>
            <button onclick="resetZoom()" class="text-[10px] font-extrabold hover:text-[#ED1C24] transition-colors">100%</button>
        </div>

        <a id="btnFormsFlotante" target="_blank" class="hidden fixed bottom-6 left-6 z-50 bg-[#ED1C24] hover:bg-[#D11118] text-white px-6 py-4 rounded-full shadow-2xl font-bold pulse-red items-center border-2 border-white transition-all">
            <span class="mr-2 text-xl">⚠️</span> Forms <span id="labelForms" class="ml-1 uppercase"></span>
        </a>

        <div id="panelDescargas" class="hidden fixed bottom-6 right-6 z-50 group">
            <div class="submenu absolute bottom-full right-0 mb-4 flex flex-col gap-2 w-64 bg-white p-3 rounded-2xl shadow-2xl border border-slate-200">
                <p class="text-[10px] text-slate-400 font-bold px-2 mb-1 uppercase tracking-widest">Reporte Mensual</p>
                <a href="reporte.pbix" download class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-3 rounded-xl font-bold text-xs flex items-center gap-3 transition-all">
                    <span>📊</span> Descargar PBIX
                </a>
                <button onclick="descargarPDFGenerado()" class="bg-[#ED1C24] hover:bg-[#D11118] text-white px-4 py-3 rounded-xl font-bold text-xs flex items-center gap-3 transition-all">
                    <span>📄</span> Descargar PDF Actual
                </button>
                
                <div id="seccionDescargasAPF" class="hidden mt-2 pt-2 border-t border-slate-100 flex flex-col gap-2">
                    <p class="text-[10px] text-slate-400 font-bold px-2 mb-1 uppercase tracking-widest">Formatos Procedimiento</p>
                    <a href="formato_pif.xlsx" download class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold text-[11px] flex items-center gap-3 transition-all">
                        <span>📁</span> Formato PIF
                    </a>
                    <a href="formato_apf.xlsx" download class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold text-[11px] flex items-center gap-3 transition-all">
                        <span>📁</span> Formato APF
                    </a>
                </div>
            </div>
            <div class="bg-slate-900 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center cursor-pointer hover:scale-105 transition-transform border-2 border-slate-700 group-hover:bg-[#ED1C24] group-hover:border-white transition-all">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </div>
        </div>
    </div>

    <script>
        var SHEET_ID = '1jniLKCMtgkJ7uTLifpCoMT8G56mOPJmjao3U7PVb4DM';
        var PDF_FILES = { 'APF': 'reporte_apf.pdf', 'CAPEX': 'reporte_capex.pdf', 'OPEX': 'reporte_opex.pdf' };
        
        var dataGerencia = null;
        var pestanaActiva = 'APF';
        var escalaActual = 3.5; // Zoom inicial HD
        var mesesArray = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        async function validarAcceso() {
            var inputCode = document.getElementById('accessCode').value.trim().toUpperCase();
            try {
                var url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
                var resp = await fetch(url);
                var text = await resp.text();
                var json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
                var rows = json.table.rows;

                for (var i = 0; i < rows.length; i++) {
                    var f = rows[i].c;
                    if (f && f[0] && f[0].v.toString().toUpperCase() === inputCode) {
                        const leer = (idx) => (f[idx] && f[idx].v) ? f[idx].v.toString() : "";
                        dataGerencia = {
                            nombre: leer(1),
                            APF: { pag: leer(2), debe: leer(3).toUpperCase() === "SI", link: leer(4) },
                            CAPEX: { pag: leer(5), debe: leer(6).toUpperCase() === "SI", link: leer(7) },
                            OPEX: { pag: leer(8), debe: leer(9).toUpperCase() === "SI", link: leer(10) }
                        };
                        break;
                    }
                }
                if (dataGerencia) {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('report-section').classList.remove('hidden');
                    document.getElementById('nombreGerencia').innerText = dataGerencia.nombre;
                    var fecha = new Date();
                    document.getElementById('subtituloMes').innerText = "REPORTE - " + mesesArray[fecha.getMonth()].toUpperCase() + " " + fecha.getFullYear();
                    document.getElementById('panelDescargas').classList.remove('hidden');
                    cambiarPestana('APF');
                } else { alert("Código no válido"); }
            } catch (e) { alert("Error de conexión"); }
        }

        function cambiarPestana(tipo) {
            pestanaActiva = tipo;
            ['APF', 'CAPEX', 'OPEX'].forEach(t => {
                const btn = document.getElementById(`tab-${t.toLowerCase()}`);
                btn.className = (t === tipo) ? "py-3 px-2 border-b-4 border-[#ED1C24] font-bold text-[#ED1C24]" : "py-3 px-2 border-b-4 border-transparent text-slate-500 hover:text-slate-800 font-bold";
            });

            // Mostrar formatos extra solo si es APF
            const secAPF = document.getElementById('seccionDescargasAPF');
            tipo === 'APF' ? secAPF.classList.remove('hidden') : secAPF.classList.add('hidden');

            const btnF = document.getElementById('btnFormsFlotante');
            if (dataGerencia[tipo].debe) {
                btnF.classList.remove('hidden'); btnF.classList.add('flex');
                btnF.href = dataGerencia[tipo].link;
                document.getElementById('labelForms').innerText = tipo;
            } else { btnF.classList.add('hidden'); }

            cargarPDF();
        }

        function ajustarZoom(delta) {
            escalaActual = Math.max(1, Math.min(6, escalaActual + delta));
            document.getElementById('zoomLabel').innerText = Math.round(escalaActual * 100) + "%";
            cargarPDF();
        }

        function resetZoom() {
            escalaActual = 1.5;
            document.getElementById('zoomLabel').innerText = "150%";
            cargarPDF();
        }

        async function cargarPDF() {
            const container = document.getElementById('pdf-container');
            const pags = dataGerencia[pestanaActiva].pag.split(/[,;]/).map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            const url = PDF_FILES[pestanaActiva];
            
            container.innerHTML = '<p class="text-center text-slate-400 mt-10 animate-pulse">Ajustando visualización...</p>';
            
            try {
                const pdfjsLib = window['pdfjs-dist/build/pdf'];
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(url).promise;
                container.innerHTML = '';
                
                for (let num of pags) {
                    if (num > 0 && num <= pdf.numPages) {
                        const page = await pdf.getPage(num);
                        const viewport = page.getViewport({ scale: escalaActual });
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        canvas.style.width = "100%"; canvas.style.maxWidth = "1100px";
                        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                        container.appendChild(canvas);
                    }
                }
            } catch (e) { container.innerHTML = '<p class="text-center text-red-400">Error al cargar el archivo.</p>'; }
        }

        async function descargarPDFGenerado() {
            try {
                const pags = dataGerencia[pestanaActiva].pag.split(/[,;]/).map(s => parseInt(s.trim())).filter(n => !isNaN(n));
                const resp = await fetch(PDF_FILES[pestanaActiva]);
                const bytes = await resp.arrayBuffer();
                const pdfOrig = await PDFLib.PDFDocument.load(bytes);
                const pdfNuevo = await PDFLib.PDFDocument.create();
                const indices = pags.filter(n => n > 0 && n <= pdfOrig.getPageCount()).map(n => n - 1);
                const copiadas = await pdfNuevo.copyPages(pdfOrig, indices);
                copiadas.forEach(p => pdfNuevo.addPage(p));
                const blob = new Blob([await pdfNuevo.save()], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Reporte_${pestanaActiva}_${dataGerencia.nombre.replace(/\s+/g, '_')}.pdf`;
                link.click();
            } catch (e) { alert("Error en descarga"); }
        }
    </script>
</body>
</html>
